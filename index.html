<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>즉석 행운 추첨 — 베이비페어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FFFBE6;height:100vh;}
.screen{display:none;width:100vw;height:100vh;align-items:center;justify-content:center;flex-direction:column;padding:2rem;}
.screen.active{display:flex;}
.card{background:#FFFFFF;border-radius:32px;padding:2.5rem;width:100%;height:100%;max-width:1100px;max-height:96vh;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.12);display:flex;flex-direction:column;justify-content:center;}

/* 공통 버튼 */
.btn-admin{position:absolute;top:1.25rem;left:1.25rem;padding:10px 18px;font-size:14px;color:#888;background:#f4f4f6;border:1px solid #e0e0e0;border-radius:999px;cursor:pointer;z-index:10;font-family:inherit;}
.btn-draw{width:100%;margin-top:1.5rem;padding:28px;font-size:26px;font-weight:700;color:#fff;background:#FF7AB5;border:none;border-radius:24px;cursor:pointer;box-shadow:0 8px 0 #CC3377;transition:transform .08s,box-shadow .08s;font-family:inherit;}
.btn-draw:not(:disabled):active{transform:translateY(5px);box-shadow:0 3px 0 #CC3377;}
.btn-draw:disabled{background:#ffd6e8;color:#ffaad0;box-shadow:0 8px 0 #ffb3d1;cursor:not-allowed;}
.btn-main{width:100%;padding:22px;font-size:20px;font-weight:700;color:#fff;background:#FF7AB5;border:none;border-radius:20px;cursor:pointer;box-shadow:0 6px 0 #CC3377;transition:transform .08s,box-shadow .08s;margin-top:1.25rem;font-family:inherit;}
.btn-main:active{transform:translateY(4px);box-shadow:0 2px 0 #CC3377;}
.btn-sec{width:100%;padding:16px;font-size:16px;font-weight:500;background:#f4f4f6;color:#888;border:1px solid #e0e0e0;border-radius:16px;cursor:pointer;box-shadow:0 4px 0 #d0d0d4;margin-top:.75rem;font-family:inherit;}
.btn-danger{color:#A32D2D;border-color:#F09595;box-shadow:0 4px 0 #F09595;}

/* 메인 화면 */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:2rem;}
.stat{background:#FFF3D4;border-radius:20px;padding:1.2rem;text-align:center;}
.stat-label{font-size:14px;color:#aaa;margin-bottom:6px;}
.stat-val{font-size:32px;font-weight:700;color:#111;}
.alert-box{background:#fff8e1;color:#b45309;border-radius:12px;padding:.8rem 1rem;font-size:15px;text-align:center;margin-bottom:1rem;}

/* 추첨 화면 */
.draw-layout{display:flex;align-items:center;justify-content:center;gap:3rem;flex:1;}
.roulette-wrap{position:relative;flex-shrink:0;}
.roulette-needle{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:52px;z-index:10;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.4));}
canvas#roulette-canvas{border-radius:50%;box-shadow:0 10px 40px rgba(0,0,0,0.18);display:block;}

/* 충전 영역 */
.charge-side{display:flex;flex-direction:column;align-items:center;gap:1.25rem;width:220px;}
.gauge-track{width:100%;height:36px;background:#e8e8ec;border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 6px rgba(0,0,0,0.12);}
.gauge-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#FF7AB5,#FFD700);transition:none;}
.gauge-label{font-size:17px;font-weight:700;color:#444;text-align:center;min-height:26px;}
.btn-charge{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#FFB3D1,#FF5FA0);border:none;cursor:pointer;box-shadow:0 10px 0 #CC3377,0 0 0 10px #FFD6E8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .08s,box-shadow .08s;position:relative;overflow:hidden;touch-action:none;}
.btn-charge.pressing{transform:scale(.91);box-shadow:0 4px 0 #CC3377,0 0 0 10px #FFD6E8;}
.btn-charge.full{background:radial-gradient(circle at 35% 35%,#FFE5F2,#FF85C2);box-shadow:0 10px 0 #CC3377,0 0 0 10px #FFD6E8,0 0 36px rgba(255,100,180,.7);}
.btn-charge .c-emoji{font-size:60px;pointer-events:none;}
.btn-charge .c-txt{font-size:15px;font-weight:700;color:#fff;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.3);}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);transform:scale(0);animation:ripa .6s linear;pointer-events:none;}
@keyframes ripa{to{transform:scale(4);opacity:0;}}
.charge-hint{font-size:14px;color:#bbb;text-align:center;line-height:1.6;}
.spin-label{text-align:center;font-size:22px;font-weight:700;color:#333;margin-top:.75rem;min-height:32px;}

/* 결과 화면 */
#confetti-canvas{position:absolute;inset:0;pointer-events:none;z-index:20;border-radius:32px;}
.result-center{display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;}
.result-face-wrap{position:relative;margin:.5rem 0 1.5rem;}
.result-face{width:300px;height:300px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:150px;border:8px solid rgba(255,255,255,.4);box-shadow:0 12px 50px rgba(0,0,0,.12);position:relative;z-index:2;}
.spin-deco{position:absolute;inset:-18px;border-radius:50%;border:5px dashed rgba(255,100,180,.5);animation:rot 5s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.result-badge{width:100%;text-align:center;padding:1.5rem 2rem;border-radius:20px;}
.result-badge.c0{background:#FAEEDA;}.result-badge.c1{background:#FAEEDA;}
.result-badge.c2{background:#E6F1FB;}.result-badge.c3{background:#EAF3DE;}
.result-badge.c4{background:#EEEDFE;}.result-badge.c5{background:#f4f4f6;}
.prize-grade{font-size:36px;font-weight:700;line-height:1.3;}
.prize-grade.c0{color:#412402;}.prize-grade.c1{color:#633806;}
.prize-grade.c2{color:#0C447C;}.prize-grade.c3{color:#27500A;}
.prize-grade.c4{color:#3C3489;}.prize-grade.c5{color:#333;}
.prize-cname{display:none;}
.prize-gift{font-size:24px;font-weight:500;margin-top:12px;opacity:.8;letter-spacing:0.5px;}

/* 관리자 */
.prize-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:16px;}
.prize-row:last-child{border-bottom:none;}
.admin-row{display:flex;align-items:center;gap:14px;margin-bottom:1.25rem;}
.admin-label{font-size:16px;color:#888;min-width:110px;}
</style>
</head>
<body>
<div id="app">

<!-- ① 메인 화면 -->
<div class="screen active" id="screen-main">
  <div class="card">
    <button class="btn-admin" onclick="showAdmin()">⚙️ 관리자</button>
    <p style="font-size:36px;font-weight:700;color:#111;text-align:center;margin-top:1.75rem;margin-bottom:.6rem;">즉석 행운 추첨</p>
    <p style="font-size:18px;color:#888;text-align:center;margin-bottom:2rem;">참여 조건 확인 후 추첨 버튼을 눌러주세요</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">오늘 참여</div><div class="stat-val" id="today-count">0</div></div>
      <div class="stat"><div class="stat-label">남은 자리</div><div class="stat-val" id="today-remain">413</div></div>
      <div class="stat"><div class="stat-label">일일 정원</div><div class="stat-val" id="today-limit">413</div></div>
    </div>
    <div id="full-alert" class="alert-box" style="display:none;">오늘 참여 인원이 마감되었습니다</div>
    <button class="btn-draw" id="btn-draw" onclick="goDraw()">🎰 추첨 시작!</button>
  </div>
</div>

<!-- ② 추첨 화면 (룰렛 + 충전 한 화면) -->
<div class="screen" id="screen-draw">
  <div class="card">
    <button class="btn-admin" onclick="cancelDraw()">← 취소</button>
    <p style="font-size:28px;font-weight:700;color:#111;text-align:center;margin-top:1.5rem;margin-bottom:2rem;" id="draw-title">버튼을 꾹 누르고 놓으세요!</p>
    <div class="draw-layout">
      <!-- 룰렛 -->
      <div class="roulette-wrap">
        <div class="roulette-needle">▼</div>
        <canvas id="roulette-canvas" width="580" height="580"></canvas>
      </div>
      <!-- 충전 버튼 -->
      <div class="charge-side">
        <div class="gauge-label" id="gauge-label">충전하세요!</div>
        <div class="gauge-track"><div class="gauge-fill" id="gauge-fill"></div></div>
        <button class="btn-charge" id="btn-charge"
          onmousedown="startCharge(event)" onmouseup="releaseCharge(event)" onmouseleave="releaseCharge(event)"
          ontouchstart="startCharge(event)" ontouchend="releaseCharge(event)" ontouchcancel="releaseCharge(event)">
          <span class="c-emoji" id="c-emoji">⚡</span>
          <span class="c-txt">HOLD!</span>
        </button>
        <div class="charge-hint" id="charge-hint">꾹 눌렀다 놓으면<br>룰렛이 돌아요!</div>
      </div>
    </div>
    <p class="spin-label" id="spin-label"></p>
  </div>
</div>

<!-- ③ 결과 화면 -->
<div class="screen" id="screen-result">
  <div class="card" id="result-card">
    <canvas id="confetti-canvas"></canvas>
    <p style="font-size:32px;font-weight:700;color:#111;text-align:center;margin-bottom:.5rem;">추첨 결과 🎉</p>
    <div class="result-center">
      <div class="result-face-wrap">
        <div class="spin-deco"></div>
        <div class="result-face" id="result-face">🦁</div>
      </div>
      <div class="result-badge c0" id="result-badge">
        <div class="prize-grade c0" id="result-grade">1등</div>
        <div class="prize-cname" id="result-cname">알렉스상</div>
        <div class="prize-gift" id="result-gift">🎁 플레이송스홈</div>
      </div>
    </div>
    <button class="btn-main" onclick="goHome()">다음 참여자 ▶</button>
  </div>
</div>

<!-- ④ 관리자 화면 -->
<div class="screen" id="screen-admin">
  <div class="card">
    <p style="font-size:20px;font-weight:700;color:#111;text-align:center;margin-bottom:1.25rem;">관리자 설정</p>
    <div style="margin-bottom:1.25rem;">
      <div class="admin-row">
        <span class="admin-label">일일 정원</span>
        <input type="number" id="input-limit" value="413" min="1" max="10000"
          style="width:100px;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:15px;"/>
        <span style="font-size:14px;color:#888;">명</span>
      </div>
    </div>
    <p style="font-size:14px;font-weight:600;color:#333;margin-bottom:.75rem;">오늘 등수별 현황</p>
    <div id="prize-status"></div>
    <button class="btn-main" onclick="saveAdmin()">✓ 저장</button>
    <button class="btn-sec btn-danger" onclick="resetDay()">↺ 오늘 데이터 초기화</button>
    <button class="btn-sec" onclick="showScreen('screen-main')">← 돌아가기</button>
  </div>
</div>

</div><!-- #app -->

/* ── 슬라이스 빌드 (캐릭터당 1조각, 면적 = daily 비율) ── */
var slices = [];
function buildSlices(){
  slices = [];
  // 최소 30도 보장 + 로그 스케일 (시각적 가독성 우선, 실제 확률은 assignChar)
  var WEIGHTS = [0.102062, 0.113017, 0.165594, 0.176117, 0.210582, 0.232628];
  var angle = -Math.PI/2;
  for(var i=0;i<CHARS.length;i++){
    var arc = WEIGHTS[i] * 2 * Math.PI;
    slices.push({ charIdx:i, start:angle, end:angle+arc, mid:angle+arc/2 });
    angle += arc;
  }
}

/* ── 로컬 스토리지 ── */
function todayKey(){
  var d=new Date();
  return 'lotto_'+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}
function getState(){
  var r=localStorage.getItem(todayKey());
  if(r)return JSON.parse(r);
  return{count:0,limit:413,prizes:{first:0,second:0,third:0,fourth:0,fifth:0,participation:0}};
}
function saveState(s){localStorage.setItem(todayKey(),JSON.stringify(s));}

/* ── 화면 전환 ── */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

/* ── 메인 화면 갱신 ── */
function updateMain(){
  var s=getState();
  document.getElementById('today-count').textContent=s.count;
  document.getElementById('today-remain').textContent=Math.max(0,s.limit-s.count);
  document.getElementById('today-limit').textContent=s.limit;
  document.getElementById('full-alert').style.display=s.count>=s.limit?'block':'none';
  document.getElementById('btn-draw').disabled=s.count>=s.limit;
}

/* ── 당첨 캐릭터 결정 (daily 비율 확률) ── */
function assignChar(prizes){
  var avail=CHARS.filter(function(c){return prizes[c.key]<c.daily;});
  if(!avail.length)return CHARS[CHARS.length-1];
  var total=avail.reduce(function(s,c){return s+c.daily;},0);
  var r=Math.random()*total;
  for(var i=0;i<avail.length;i++){r-=avail[i].daily;if(r<=0)return avail[i];}
  return avail[avail.length-1];
}

/* ================================================================
   룰렛 그리기
================================================================ */
var CX=290, CY=290, R=282;
var rouletteAngle=0;

function drawRoulette(offset){
  var canvas=document.getElementById('roulette-canvas');
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,580,580);

  for(var i=0;i<slices.length;i++){
    var sl=slices[i], c=CHARS[sl.charIdx];
    var s=sl.start+offset, e=sl.end+offset;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,s,e);ctx.closePath();
    ctx.fillStyle=c.color;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();
  }

  // 캐릭터 이미지 + 이름
  for(var i=0;i<slices.length;i++){
    var sl=slices[i], c=CHARS[sl.charIdx];
    var arc=sl.end-sl.start;
    var mid=sl.mid+offset;
    var dist=R*0.66;
    ctx.save();
    ctx.translate(CX+dist*Math.cos(mid), CY+dist*Math.sin(mid));
    ctx.rotate(mid+Math.PI/2);
    var imgSize = arc > 1.2 ? 80 : arc > 0.9 ? 70 : arc > 0.6 ? 60 : 52;
    // 이미지 그리기
    var imgObj=CHAR_IMAGES[sl.charIdx];
    if(imgObj && imgObj.complete && imgObj.naturalWidth>0){
      ctx.drawImage(imgObj,-imgSize/2,-imgSize/2-6,imgSize,imgSize);
    } else {
      // 이미지 로드 전 대체 텍스트
      ctx.fillStyle='#fff';
      ctx.font='bold 10px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(c.name,0,0);
    }
    var nameSize = arc > 1.2 ? 20 : arc > 0.9 ? 18 : arc > 0.6 ? 16 : 15;
    ctx.font='bold '+nameSize+'px sans-serif';
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=3;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.name,0,imgSize/2+4);
    ctx.restore();
  }

  // 중앙 원
  ctx.beginPath();ctx.arc(CX,CY,36,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#ddd';ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 15px sans-serif';ctx.fillStyle='#FF5FA0';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#FF5FA0';ctx.fillStyle='#FF5FA0';ctx.fillText('GO!',CX,CY);
}

/* ── 바늘 위치(12시=-π/2)의 캐릭터 반환 ── */
function getCharAtNeedle(offset){
  var needle=-Math.PI/2;
  var local=needle-offset;
  local=((local%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
  for(var i=0;i<slices.length;i++){
    var s=((slices[i].start%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
    var e=((slices[i].end%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
    if(s<e){if(local>=s&&local<e)return CHARS[slices[i].charIdx];}
    else{if(local>=s||local<e)return CHARS[slices[i].charIdx];}
  }
  return CHARS[slices[slices.length-1].charIdx];
}

/* ================================================================
   충전 로직
================================================================ */
var chargeTimer=null, chargeVal=0, chargeMax=3000;
var charging=false, chargeStart=0;
var currentWinner=null, spinAnim=null, canCharge=true;

function goDraw(){
  buildSlices();
  chargeVal=0;charging=false;canCharge=true;
  document.getElementById('gauge-fill').style.width='0%';
  document.getElementById('gauge-label').textContent='충전하세요!';
  document.getElementById('spin-label').textContent='';
  document.getElementById('draw-title').textContent='버튼을 꾹 누르고 놓으세요!';
  document.getElementById('btn-charge').classList.remove('full','pressing');
  document.getElementById('btn-charge').style.pointerEvents='auto';
  document.getElementById('c-emoji').textContent='⚡';
  document.getElementById('charge-hint').style.display='block';
  var s=getState();currentWinner=assignChar(s.prizes);
  drawRoulette(rouletteAngle);
  showScreen('screen-draw');
}

function startCharge(e){
  e.preventDefault();
  if(!canCharge||charging)return;
  charging=true;chargeStart=Date.now();
  document.getElementById('btn-charge').classList.add('pressing');
  var btn=document.getElementById('btn-charge');
  var rip=document.createElement('span');rip.className='ripple';
  rip.style.width=rip.style.height='120px';rip.style.left='12px';rip.style.top='12px';
  btn.appendChild(rip);setTimeout(function(){rip.remove();},600);
  chargeTimer=setInterval(function(){
    chargeVal=Math.min(Date.now()-chargeStart,chargeMax);
    var pct=chargeVal/chargeMax*100;
    document.getElementById('gauge-fill').style.width=pct+'%';
    if(pct<30){document.getElementById('gauge-label').textContent='더 눌러요! 💪';document.getElementById('c-emoji').textContent='⚡';}
    else if(pct<60){document.getElementById('gauge-label').textContent='좋아요! 🔥';document.getElementById('c-emoji').textContent='🔥';}
    else if(pct<90){document.getElementById('gauge-label').textContent='거의 MAX! ⚡';document.getElementById('c-emoji').textContent='⚡';}
    else{document.getElementById('gauge-label').textContent='MAX! 🚀';document.getElementById('btn-charge').classList.add('full');document.getElementById('c-emoji').textContent='🚀';}
  },30);
}

function releaseCharge(e){
  e.preventDefault();
  if(!charging)return;
  charging=false;clearInterval(chargeTimer);
  document.getElementById('btn-charge').classList.remove('pressing');
  var pct=chargeVal/chargeMax;
  if(pct<0.05){
    document.getElementById('gauge-label').textContent='너무 짧아요! 😅';
    chargeVal=0;document.getElementById('gauge-fill').style.width='0%';
    document.getElementById('btn-charge').classList.remove('full');
    document.getElementById('c-emoji').textContent='⚡';
    return;
  }
  canCharge=false;
  document.getElementById('btn-charge').style.pointerEvents='none';
  document.getElementById('charge-hint').style.display='none';
  var power=2+pct*7; // 2~9바퀴
  spinRoulette(power);
}

/* ================================================================
   룰렛 스핀 — 당첨 슬라이스로 정확히 이동
================================================================ */
function spinRoulette(power){
  document.getElementById('draw-title').textContent='돌아가는 중! 🎰';

  // 당첨 슬라이스 찾기
  var winSlice=null;
  for(var i=0;i<slices.length;i++){
    if(CHARS[slices[i].charIdx].key===currentWinner.key){winSlice=slices[i];break;}
  }

  // 슬라이스 중앙 ±35% 랜덤 착지
  var arc=winSlice.end-winSlice.start;
  var jitter=(Math.random()-0.5)*arc*0.7;
  var targetOffset=-Math.PI/2-winSlice.mid+jitter;

  var diff=targetOffset-rouletteAngle;
  diff=((diff%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
  if(diff<0.1)diff+=2*Math.PI;
  var finalAngle=rouletteAngle+Math.ceil(power)*2*Math.PI+diff;

  var from=rouletteAngle, start=null;
  var duration=1500+power*550;

  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(ts){
    if(!start)start=ts;
    var p=Math.min((ts-start)/duration,1);
    rouletteAngle=from+(finalAngle-from)*ease(p);
    drawRoulette(rouletteAngle);
    if(p<1){spinAnim=requestAnimationFrame(frame);}
    else{
      rouletteAngle=finalAngle;
      drawRoulette(rouletteAngle);
      var actual=getCharAtNeedle(rouletteAngle);
      document.getElementById('draw-title').textContent='당첨! 🎉';
      document.getElementById('spin-label').textContent=actual.prize+' '+actual.name+'!';
      var s=getState();s.prizes[actual.key]++;s.count++;saveState(s);
      var w=actual;
      setTimeout(function(){showResult(w);},1100);
    }
  }
  spinAnim=requestAnimationFrame(frame);
}

function cancelDraw(){
  if(spinAnim)cancelAnimationFrame(spinAnim);
  updateMain();showScreen('screen-main');
}

/* ================================================================
   폭죽 (1등·2등 전용)
================================================================ */
var cp=[],ca=null;
function launchConfetti(){
  var cv=document.getElementById('confetti-canvas');
  var card=document.getElementById('result-card');
  cv.width=card.offsetWidth;cv.height=card.offsetHeight;
  var ctx=cv.getContext('2d');cp=[];
  var colors=['#FFD700','#FF4D4D','#4D94FF','#4DFF91','#FF4DFF','#FF9900','#00CFFF','#FF6B6B','#A78BFA'];
  for(var i=0;i<180;i++){
    var side=Math.random()<0.5?cv.width*.25:cv.width*.75;
    cp.push({x:side,y:cv.height*.3,vx:(Math.random()-.5)*16,vy:-(Math.random()*20+8),
      size:Math.random()*9+4,color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.3,
      shape:Math.random()<.5?'rect':'circle',alpha:1,g:.45+Math.random()*.2});
  }
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);var alive=false;
    for(var i=0;i<cp.length;i++){
      var p=cp[i];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;
      if(p.y>cv.height+20){p.alpha=0;continue;}
      p.alpha=Math.max(0,p.alpha-.008);if(p.alpha<=0)continue;alive=true;
      ctx.save();ctx.globalAlpha=p.alpha;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;
      if(p.shape==='rect')ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    }
    if(alive)ca=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  ca=requestAnimationFrame(draw);
  setTimeout(function(){
    var c2=['#FFD700','#FFF','#FF4D4D','#4DFF91','#00CFFF'];
    for(var i=0;i<100;i++)cp.push({
      x:cv.width/2,y:cv.height*.2,vx:(Math.random()-.5)*22,vy:-(Math.random()*16+4),
      size:Math.random()*8+3,color:c2[Math.floor(Math.random()*c2.length)],
      rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.25,
      shape:Math.random()<.5?'rect':'circle',alpha:1,g:.4+Math.random()*.2});
  },600);
}
function stopConfetti(){
  if(ca){cancelAnimationFrame(ca);ca=null;}
  var cv=document.getElementById('confetti-canvas');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}

/* ── 결과 화면 ── */
function showResult(w){
  stopConfetti();
  var rf=document.getElementById('result-face');
  rf.innerHTML='<img src="'+w.img+'" style="width:180px;height:180px;object-fit:contain;" />';
  rf.style.background=w.bg;
  document.getElementById('result-grade').textContent=w.prize+' '+w.name+'상';
  document.getElementById('result-grade').className='prize-grade '+w.cls;
  document.getElementById('result-cname').textContent='';
  document.getElementById('result-gift').textContent=w.gift;
  document.getElementById('result-badge').className='result-badge '+w.cls;
  showScreen('screen-result');
  if(w.vip)setTimeout(launchConfetti,200);
}

function goHome(){
  stopConfetti();
  if(spinAnim)cancelAnimationFrame(spinAnim);
  updateMain();showScreen('screen-main');
}

var CHAR_IMAGES=[];
(function(){
